name: ipfs_example
description: "IPFS Flutter Demo App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dart_ipfs_client:
    path: ..
  mopro_flutter_bindings:
    path: ../mopro_flutter_bindings
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/multiplier2_final.zkey
    - assets/multiplier2.bin
